<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Student</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #ffffff;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00c6ff, #a445ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 40px;
            width: 350px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #b8b8d1;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #00c6ff;
        }

        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
        }

        select:focus {
            outline: none;
            border-color: #00c6ff;
        }

        select option {
            background: #1a1a2e;
            color: white;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #00c6ff, #a445ff);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.85;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #b8b8d1;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <h1>Edit Student</h1>

    <div class="form-card">
        <form action="/update/{{ student[0] }}" method="POST">
            <label>Student Name</label>
            <input type="text" name="name" value="{{ student[1] }}" required>

            <label>Department / Course</label>
            <select name="department" required>
                <option value="">-- Select Department --</option>
                <option value="BCA" {% if student[2] == 'BCA' %}selected{% endif %}>BCA</option>
                <option value="B.Tech CSE" {% if student[2] == 'B.Tech CSE' %}selected{% endif %}>B.Tech CSE</option>
                <option value="B.Tech IT" {% if student[2] == 'B.Tech IT' %}selected{% endif %}>B.Tech IT</option>
                <option value="B.Tech ECE" {% if student[2] == 'B.Tech ECE' %}selected{% endif %}>B.Tech ECE</option>
                <option value="B.Tech Mechanical" {% if student[2] == 'B.Tech Mechanical' %}selected{% endif %}>B.Tech Mechanical</option>
                <option value="B.Tech Civil" {% if student[2] == 'B.Tech Civil' %}selected{% endif %}>B.Tech Civil</option>
                <option value="B.Tech Electrical" {% if student[2] == 'B.Tech Electrical' %}selected{% endif %}>B.Tech Electrical</option>
                <option value="BBA" {% if student[2] == 'BBA' %}selected{% endif %}>BBA</option>
                <option value="B.Com" {% if student[2] == 'B.Com' %}selected{% endif %}>B.Com</option>
                <option value="BA" {% if student[2] == 'BA' %}selected{% endif %}>BA</option>
                <option value="BSc" {% if student[2] == 'BSc' %}selected{% endif %}>BSc</option>
                <option value="LLB" {% if student[2] == 'LLB' %}selected{% endif %}>LLB (Law)</option>
                <option value="BA LLB" {% if student[2] == 'BA LLB' %}selected{% endif %}>BA LLB (Law)</option>
                <option value="B.Com LLB" {% if student[2] == 'B.Com LLB' %}selected{% endif %}>B.Com LLB (Law)</option>
                <option value="MBA" {% if student[2] == 'MBA' %}selected{% endif %}>MBA</option>
                <option value="MCA" {% if student[2] == 'MCA' %}selected{% endif %}>MCA</option>
                <option value="M.Tech" {% if student[2] == 'M.Tech' %}selected{% endif %}>M.Tech</option>
                <option value="M.Com" {% if student[2] == 'M.Com' %}selected{% endif %}>M.Com</option>
                <option value="MA" {% if student[2] == 'MA' %}selected{% endif %}>MA</option>
                <option value="MSc" {% if student[2] == 'MSc' %}selected{% endif %}>MSc</option>
                <option value="B.Pharma" {% if student[2] == 'B.Pharma' %}selected{% endif %}>B.Pharma (Pharmacy)</option>
                <option value="BDS" {% if student[2] == 'BDS' %}selected{% endif %}>BDS (Dental)</option>
                <option value="MBBS" {% if student[2] == 'MBBS' %}selected{% endif %}>MBBS (Medical)</option>
                <option value="B.Ed" {% if student[2] == 'B.Ed' %}selected{% endif %}>B.Ed (Education)</option>
                <option value="B.Arch" {% if student[2] == 'B.Arch' %}selected{% endif %}>B.Arch (Architecture)</option>
            </select>

            <label>CGPA</label>
            <input type="number" step="0.01" min="0" max="10" name="cgpa" value="{{ student[3] }}" required>

            <button type="submit">Update Student</button>
        </form>
        <a href="/">← Back to Home</a>
    </div>

</body>
</html>
