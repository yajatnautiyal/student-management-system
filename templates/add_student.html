<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #0d0d0d);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #ffffff;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #00e5cc;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 350px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #999999;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.03);
            color: white;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00e5cc;
        }

        select option {
            background: #1a1a1a;
            color: white;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: #00e5cc;
            color: #0a0a0a;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        button:hover {
            opacity: 0.85;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #999999;
            text-decoration: none;
        }

        a:hover {
            color: #00e5cc;
        }
    </style>
</head>
<body>

    <h1>Add New Student</h1>

    <div class="form-card">
        <form action="/add" method="POST">
            <label>Student Name</label>
            <input type="text" name="name" required>

            <label>Department / Course</label>
            <select name="department" required>
                <option value="">-- Select Department --</option>
                <option value="BCA">BCA</option>
                <option value="B.Tech CSE">B.Tech CSE</option>
                <option value="B.Tech IT">B.Tech IT</option>
                <option value="B.Tech ECE">B.Tech ECE</option>
                <option value="B.Tech Mechanical">B.Tech Mechanical</option>
                <option value="B.Tech Civil">B.Tech Civil</option>
                <option value="B.Tech Electrical">B.Tech Electrical</option>
                <option value="BBA">BBA</option>
                <option value="B.Com">B.Com</option>
                <option value="BA">BA</option>
                <option value="BSc">BSc</option>
                <option value="LLB">LLB (Law)</option>
                <option value="BA LLB">BA LLB (Law)</option>
                <option value="B.Com LLB">B.Com LLB (Law)</option>
                <option value="MBA">MBA</option>
                <option value="MCA">MCA</option>
                <option value="M.Tech">M.Tech</option>
                <option value="M.Com">M.Com</option>
                <option value="MA">MA</option>
                <option value="MSc">MSc</option>
                <option value="B.Pharma">B.Pharma (Pharmacy)</option>
                <option value="BDS">BDS (Dental)</option>
                <option value="MBBS">MBBS (Medical)</option>
                <option value="B.Ed">B.Ed (Education)</option>
                <option value="B.Arch">B.Arch (Architecture)</option>
            </select>

            <label>CGPA</label>
            <input type="number" step="0.01" min="0" max="10" name="cgpa" required placeholder="e.g. 8.5">

            <button type="submit">Add Student</button>
        </form>
        <a href="/">← Back to Home</a>
    </div>

</body>
</html>
